name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: "true"   # کلید جلوگیری از promptهای تعاملی

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flet

      # ---------- مهم‌ترین قدم ----------
      - name: Install Flutter SDK (non-interactive)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'

      # ---------------------------------
      - name: Build APK
        run: |
          flet build apk \
            --android-permissions INTERNET \
            --build-version 1.0.0 \
            --build-number 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cipher-apk
          path: build/apk/*.apk
