name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flet

      - name: Build APK
        run: |
          flet build apk \
            --android-permissions INTERNET \
            --build-version 1.0.0 \
            --build-number 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cipher-apk
          path: build/apk/*.apk
